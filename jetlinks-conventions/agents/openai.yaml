interface:
  display_name: "JetLinks Conventions"
  short_description: "JetLinks 通用规范、导入、国际化、链路追踪、MBean与根因约束"
  default_prompt: >-
    使用 $jetlinks-conventions 在动手前先确认本地编码规范、注解与导入、命名约定、i18n、TraceHolder 链路追踪、MBean 运维可观测性决策与根因处理路径。1)必读：references/code-conventions.md（命名 / 包结构 / 最小改动 / Java 可读性）、references/tracing.md（TraceHolder / MonoTracer / FluxTracer 埋点、属性、上下文传播和敏感信息边界）、references/mbean-observability.md（常驻任务 / 缓存 / 队列 / 重试池的 MBean 统计、监控、内部操作和安全边界）、references/annotations-and-imports-reference.md（Lombok / Spring / Reactor 注解 + 导入边界）、references/i18n.md + references/i18n-usage.md（LocaleUtils / I18nEnumDict / messages_zh|en / 权限动作文案）、references/root-cause-and-no-hack-rules.md（禁 hack 红线与替代路径）。2)可读性：业务流程编排、协议解析、状态机流转、复杂校验优先过程式代码；集合过滤、DTO 转换、简单分组聚合、纯数据变换可用 Stream；长 fluent / stream 链按业务阶段拆成命名变量或私有方法；不要用 peek、lambda 修改外部变量，或在 Stream 中隐藏权限、缓存、DB、远程调用、事件发布等副作用。3)链路追踪：新增或修改关键后端业务流程时，判断是否需要手动 span；关键命令、状态流转、规则场景、协议链路、批处理、跨模块调用、外部 I/O、事件 / 订阅等位置优先用平台 TraceHolder / MonoTracer / FluxTracer 或领域 tracer 埋点；span 名称稳定低基数，属性记录 deviceId / productId / ruleId / taskId / commandId / sessionId / action / state / count / status 等非敏感关键信息；不要记录 token、密钥、完整 Authorization / Cookie、隐私字段、完整大 payload、无界集合或高基数用户输入；跨 HTTP / RSocket / 消息 / 事件 / RuleData / Command metadata 边界用 TraceHolder.readToContext / writeContextTo 传播上下文。4)MBean：常驻内存任务、缓存、队列、buffer、重试池、会话 / 连接 / 订阅管理器或后台执行器要判断是否需要 MBean；需要时暴露统计、状态、最近错误、耗时 / 积压等监控字段，以及 refresh / flush / compact / retry / reset 等安全内部操作；ObjectName 稳定并转义动态 name，启动注册、关闭注销，不暴露密钥、完整 payload、隐私字段或无界集合。5)工具 / SDK / 框架 / 现有 API 不直接满足需求时（无法访问方法、序列化报错、响应式 / 阻塞不匹配、类型不兼容、第三方行为偏差、异常体系缺口、编译告警、测试不稳等），按顺序解决根因：官方扩展点 → 相邻模块已封装 → 依赖版本 / 选择是否合理 → 告知用户限制与替代方案；不能根本解决的明确告知用户哪里"做不到"以及"为什么"。6)红线（禁止）：反射 + setAccessible、Unsafe、改可见性、复制粘贴第三方源码、字节码注入、monkey patch、把代码挪进库的包路径、catch(Exception e){} 静默吞、e.printStackTrace() 当处理、@SuppressWarnings 大范围压制告警、注释掉失败测试、改测试期望迁就错误实现。7)任何高风险手法（反射 / Unsafe / 改可见性 / 复制源码 / monkey patch / 在 i18n 模块硬编码 message / 响应式模块阻塞调用 / 新增不稳定依赖）必须先告知用户限制与风险并取得确认，再在代码注释或交付说明中留痕。8)发布边界：同 PR 未发布中间形态不保留兼容代码，优先收敛到最佳实践并同步调用方 / 测试 / 文档；只有已发布、持久化、外部依赖或用户明确要求时才写兼容 / 迁移。9)i18n 决策：用户可见文案、业务异常 message、字典枚举、权限动作 → 走 i18n；内部日志、调试输出 → 不走。10)协同：响应式 / 阻塞冲突的根因落地切 $jetlinks-reactive；跨边界访问受限的根因落地切 $jetlinks-boundary；模块归属歧义切 $jetlinks-routing；落地完成切 $jetlinks-delivery 准备交付。
