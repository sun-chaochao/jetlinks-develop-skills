interface:
  display_name: "JetLinks Conventions"
  short_description: "JetLinks 通用规范、导入、国际化与根因处理约束"
  default_prompt: >-
    使用 $jetlinks-conventions 在动手前先确认本地编码规范、注解与导入、命名约定、i18n 决策与根因处理路径。1)必读：references/code-conventions.md（命名 / 包结构 / 最小改动）、references/annotations-and-imports-reference.md（Lombok / Spring / Reactor 注解 + 导入边界）、references/i18n.md + references/i18n-usage.md（LocaleUtils / I18nEnumDict / messages_zh|en / 权限动作文案）、references/root-cause-and-no-hack-rules.md（禁 hack 红线与替代路径）。2)工具 / SDK / 框架 / 现有 API 不直接满足需求时（无法访问方法、序列化报错、响应式 / 阻塞不匹配、类型不兼容、第三方行为偏差、异常体系缺口、编译告警、测试不稳等），按顺序解决根因：官方扩展点 → 相邻模块已封装 → 依赖版本 / 选择是否合理 → 告知用户限制与替代方案；不能根本解决的明确告知用户哪里"做不到"以及"为什么"。3)红线（禁止）：反射 + setAccessible、Unsafe、改可见性、复制粘贴第三方源码、字节码注入、monkey patch、把代码挪进库的包路径、catch(Exception e){} 静默吞、e.printStackTrace() 当处理、@SuppressWarnings 大范围压制告警、注释掉失败测试、改测试期望迁就错误实现。4)任何高风险手法（反射 / Unsafe / 改可见性 / 复制源码 / monkey patch / 在 i18n 模块硬编码 message / 响应式模块阻塞调用 / 新增不稳定依赖）必须先告知用户限制与风险并取得确认，再在代码注释或交付说明中留痕。5)发布边界：同 PR 未发布中间形态不保留兼容代码，优先收敛到最佳实践并同步调用方 / 测试 / 文档；只有已发布、持久化、外部依赖或用户明确要求时才写兼容 / 迁移。6)i18n 决策：用户可见文案、业务异常 message、字典枚举、权限动作 → 走 i18n；内部日志、调试输出 → 不走。7)协同：响应式 / 阻塞冲突的根因落地切 $jetlinks-reactive；跨边界访问受限的根因落地切 $jetlinks-boundary；模块归属歧义切 $jetlinks-routing；落地完成切 $jetlinks-delivery 准备交付。
