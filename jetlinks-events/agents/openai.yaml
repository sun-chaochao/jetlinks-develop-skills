interface:
  display_name: "JetLinks Events"
  short_description: "JetLinks 事件驱动与订阅处理"
  default_prompt: >-
    使用 $jetlinks-events 实现 JetLinks 实体生命周期监听、领域事件、主题订阅、消息处理器与其他异步副作用。1)必读：references/event-driven-rules.md（实体生命周期 / Spring 事件 / 领域联动 / 触发时机 / 跨模块联动 / 注释落地）、references/realtime-subscription-rules.md（主题订阅、消息处理器、批处理、幂等性 / 注释落地）。2)核心原则：事件负责解耦不替代主业务，主业务仍在 Service / Controller 中保持清晰；先选正确触发时机（创建前 / 保存前 / 修改后 / 删除后 / 提交后），不混用；跟随当前模块执行模型（响应式模块优先异步事件、阻塞模块跟同步事务边界）；外部副作用（发布消息 / 远程调用 / 缓存同步 / 关系清理）优先在提交后执行，避免事务未提交就外泄。3)事件类型选择：CRUD 数据联动 / 冗余字段同步 / 关联清理 → 实体生命周期事件；业务语义独立、动作需要被多个模块消费 → 自定义领域事件。4)低上下文模板仓库：先用实体生命周期事件起步（比自定义领域事件更易保持最小实现），业务语义明显独立再抽自定义；用户没要求同步返回结果时默认把副作用从主流程拆到事件处理器。5)处理器实现：职责单一（一个处理器一类联动）；修改后逻辑读取"修改后"数据，前后对比再同时读 before / after；防止循环触发，处理里再更新同一实体时确认是否抑制二次事件；大批量联动用批处理，不逐条串行。6)主题订阅 / 消息处理器：高吞吐场景复用 buffer / window / 批处理 sink / 去重策略；处理器保持幂等避免重放重复副作用；响应式模块的处理器返回 Mono<Void> 或本框架惯用异步类型。7)注释门禁：非显而易见的触发时机、事务提交后边界、幂等 / 重放、循环抑制、Topic 兼容、批量 / 去重边界、订阅生命周期必须把短注释写在代码旁边；简单一跳转发不写噪声注释。8)自检：触发时机、事务提交时机、循环触发、单一职责、批处理、幂等、必要注释。9)协同：响应式链路 / 阻塞回退切 $jetlinks-reactive；事件里的批量 / 复杂查询切 $jetlinks-crud；事件调用其他边界切 $jetlinks-boundary；命名 / 注解 / i18n / 注释 / 根因切 $jetlinks-conventions。
