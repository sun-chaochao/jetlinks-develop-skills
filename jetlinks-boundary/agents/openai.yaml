interface:
  display_name: "JetLinks Boundary"
  short_description: "JetLinks 跨模块边界与命令调用"
  default_prompt: >-
    使用 $jetlinks-boundary 决定本次 JetLinks 改动应使用直接依赖、命令服务、代理还是其他边界形式。1)必读：references/cross-service-call-rules.md（命令模式判定、consumer / provider 规则、低上下文模板仓库模式 / 注释落地）、references/module-reference.md（同仓库直接依赖 vs 跨域 / 跨服务边界的取舍）。2)先确认当前脚手架是否已采用命令模式：搜 @CommandService / command support / proxy / provider、固定的 service id / support id / command id、是否已有 QueryCommand / SaveCommand 或本地自定义 command DTO / handler；没有这套机制不要凭空引入。3)低上下文模板仓库：默认不创建命令边界；除非用户明确要求或依赖与目录结构已表明命令框架是脚手架内建能力；用户要求时只创建最小 provider / consumer 契约，service id / command id 用稳定可解释的命名，结果中明确"这是模板仓库的首个命令样例"。4)同仓库本地能力复用：默认先用直接依赖或接口抽象，不因为"以后可能拆服务"提前上命令层。5)Consumer 规则：调用方不持有 provider 内部实现细节；契约通过 command DTO + 已知 service id / command id 表达；调用入口尽量靠近业务边界，不把命令调用扩散到内部 service。6)Provider 规则：暴露的能力命名稳定，幂等性、参数校验、异常体系按本模块习惯统一；命令处理保持非阻塞或与本模块编程模型一致；i18n 文案统一走 message 资源不要写死。7)注释门禁：command DTO / handler / provider / proxy / adapter 等公共契约要写类或方法注释；service id / command id、权限上下文、payload 兼容、fallback / retry、边界选择原因要在代码旁边写短注释；内部直观直接依赖不写噪声注释。8)代理 / 适配场景：仅在跨语言 / 跨进程 / 协议适配等明确边界使用；不要为"内部松耦合"上代理层。9)协同：命令链路里的 Mono / Flux / 阻塞冲突切 $jetlinks-reactive；命令承载 CRUD 副作用切 $jetlinks-crud；命令承载事件 / 订阅切 $jetlinks-events；契约里的注释 / 反射 / 可见性 / 跨模块 hack 切 $jetlinks-conventions；新建命令模块的归属切 $jetlinks-routing。
