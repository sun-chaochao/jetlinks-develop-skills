interface:
  display_name: "JetLinks Router"
  short_description: "JetLinks 二开总路由与多技能入口"
  default_prompt: >-
    使用 $jetlinks-router 对当前 JetLinks 任务做"分类 + 路由"，自身只指路不实现。1)按任务类型路由：前端页面 / 组件 / 交互 / 样式 / 筛选 / 详情 / 弹窗 → $jetlinks-web；页面结构存在多种合理业务方案 → 先 $jetlinks-web-style 让用户选；后端模块定位 / 软链接识别 / 新建模块 → $jetlinks-routing；CRUD 实体 / 服务 / 控制器 / 批量 → $jetlinks-crud；AssetsHolder 数据权限 / 资产权限 / @AssetsController / CrudAssetPermission → $jetlinks-assets-permission；跨模块边界（直接依赖 / 命令 / 代理）→ $jetlinks-boundary；事件 / 主题订阅 / 异步副作用 → $jetlinks-events；Mono / Flux 链路、阻塞排查、响应式 CRUD 副作用 → $jetlinks-reactive；协议包、编解码、Topic 路由、二进制报文 → $jetlinks-protocol；编码规范 / 注解 / 命名 / i18n / TraceHolder 链路追踪 / 根因与禁止 hack → $jetlinks-conventions；提交、shell 命令、测试证据、PR → $jetlinks-delivery；任务完成后判断是否沉淀 → $jetlinks-capture。2)较大的后端改动或新功能必须读取 references/backend-design-test-driven-rules.md 和 references/document-placement-rules.md，先把设计稿、任务拆分和测试目标落到对应归属文档并等待用户明确确认；README 只放长期总览，不放测试报告、任务流水或 PR 证据；用户确认后先按真实使用场景和数据制定测试目标，再开发直到目标达成，不允许为了过测而弱化断言或绕过真实业务校验；涉及关键后端业务链路、状态流转、命令执行、事件 / 订阅、协议链路、批处理或外部 I/O 时必须写明 TraceHolder / MonoTracer / FluxTracer 埋点目标、关键属性、上下文传播和敏感信息排除，不需要新增埋点时说明已有平台自动追踪或不适用依据；涉及复杂 SQL / 原生 SQL / 聚合 / 多表 / 深分页 / 批量写入时必须写明标准 SQL 可移植性、数据库方言风险、真实数据规模和压力测试目标；兼容性先看发布边界，同一 PR 内未发布中间形态优先收敛为最佳实践，已发布 / 持久化 / 外部依赖才设计兼容或迁移；添加兼容代码前必须说明兼容对象，拿不准是否已发布或外部依赖时只问一个具体确认问题。3)涉及 CRUD 查询 / 详情 / 更新 / 删除 / 批量 / 导出 / 自定义接口时，必须分析是否需要 AssetsHolder 数据权限控制；具体实现切 $jetlinks-assets-permission，不手写租户 / 部门 / 创建人过滤；资产类型、关联字段、权限动作或例外规则拿不准时先问用户。4)同一任务横跨多个 skill 时按主语挂载：以"动作 + 对象"取最契合的一个为主路由，其余在该 skill 的协同提示里联动，不要把多个 skill 都拉到自己 prompt 里复述细节。5)前端实现以当前 workspace 的 jetlinks-web-core 为准，不把 jetlinks-project-ui-cli 当默认依赖。6)后端遇到工具 / SDK / 框架 / 现有 API 不直接满足需求（无法访问方法、序列化报错、响应式与阻塞不匹配、类型不兼容、异常体系缺口等）时，统一切到 $jetlinks-conventions 走"官方扩展点 → 相邻模块封装 → 依赖版本 / 选择 → 告知用户"的根因路径，禁止 router 自身扩展 hack 规则细节，所有 no-hack 红线以 jetlinks-conventions/references/root-cause-and-no-hack-rules.md 为准。7)如果用户给的是含糊任务（如"优化一下这块"），先反问一句明确改前端还是后端、是结构还是规范，再决定路由；不要默认假设。
