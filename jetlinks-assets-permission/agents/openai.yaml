interface:
  display_name: "JetLinks Assets Permission"
  short_description: "JetLinks AssetsHolder 数据权限实现"
  default_prompt: >-
    使用 $jetlinks-assets-permission 处理 JetLinks 后端数据权限，统一走 AssetsHolder 资产权限体系。1)必读 references/assets-holder-rules.md。2)先查当前模块已有 AssetType / EnumAssetType、CrudAssetPermission 或自定义 AssetPermission、@AssetsController、AssetsHolderCrudController、CorrelatesAssetsHolderCrudController、AssetsHolder.injectQueryParam / assertPermission / filterAssets、AssetsHolderCommandSupport 和相邻测试。3)实体自身是资产时优先 AssetsHolderCrudController + @AssetsController(type=...)；实体通过字段关联其他资产时优先 CorrelatesAssetsHolderCrudController 并实现 getAssetType / getAssetIdMapper / getAssetProperty；自定义查询或聚合使用 AssetsHolder.injectQueryParam / injectConditional；详情、更新、删除、自定义动作使用 AssetsHolder.assertPermission；命令边界查 AssetsCrudCommandHandler / AssetsHolderCommandSupport。4)不要手写 tenant_id / creator_id / org_id 过滤当作通用数据权限；不要 @AssetsController(ignore=true) 后漏掉等价校验；不要只做功能权限而漏资产权限。5)拿不准资产类型、关联字段、权限动作、绑定关系、管理员例外或跨租户 / 平台上下文时先问用户。6)测试必须覆盖有权限、无权限、关联字段、批量混入无权限 ID、自定义查询 / 聚合 / 导出不会绕过 AssetsHolder；不能把 AssetsHolder mock 成永远通过。
