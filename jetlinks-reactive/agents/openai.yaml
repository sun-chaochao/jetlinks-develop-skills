interface:
  display_name: "JetLinks Reactive"
  short_description: "JetLinks 响应式编程与非阻塞实践"
  default_prompt: >-
    使用 $jetlinks-reactive 保证当前 JetLinks 改动与本地 Mono / Flux 风格一致并避免阻塞错误。1)先确认当前模块是响应式还是阻塞式：看控制器返回类型、服务基类、仓储抽象、相邻模块是否普遍使用 Mono / Flux / 异步事件 / 异步订阅；模块是阻塞式就跟随现有阻塞事务边界，不为局部新功能强行包响应式外壳。2)按官方边界判断：Reactive Streams 的边界是 Publisher / Subscriber / Subscription 的需求、取消和终止信号；链路从已有 Publisher 或第一个真实异步边界开始，不从本地普通对象开始。3)响应式模块保持 Mono / Flux 链路连续：不用 block() 回退同步；主业务控制流留在返回链中；subscribe() 只用于框架托管之外且明确隔离的边缘场景；批量更新 / 删除 / 消费 / 联动同步优先批量抽象，避免在 flatMap 内逐条 DB 或远程调用形成 N 次往返；外部副作用优先后移到事件层或提交后阶段。4)操作符用来组合函数，语义必须清晰：map / filter 组合纯函数；flatMap / concatMap 表达异步边界；zip / zipWhen 表达多来源依赖；then / thenReturn 表达忽略前值后的下一步；doOnNext / doOnSuccess 只做观察。当前栈上已有普通对象时，不用 Mono.just(request).map(...).flatMap(...) 开链，先普通构造参数并直接调用第一个响应式边界，如 repository.save(request.toEntity())；纯转换 / 字段计算 / 条件判断保持普通方法，不封装成 Mono / Flux；同一个同步业务步骤避免连续 map，合成命名函数；长 Reactor 链按校验、权限、命令、持久化、日志、事件等业务阶段拆成命名方法；避免 flatMap(Mono::just)、identity map、then(Mono.just(...))、连续 filter；复杂条件抽命名谓词。5)关键响应式业务阶段用 MonoTracer / FluxTracer 或领域 tracer 手动埋点，记录稳定 span 名称和 deviceId / ruleId / taskId / commandId / state / count / status 等非敏感关键属性；跨 HTTP / RSocket / 消息 / 事件 / RuleData / Command metadata 边界用 TraceHolder.readToContext / writeContextTo 传播上下文；详细边界走 $jetlinks-conventions 的 references/tracing.md。6)collectList 只用于明确有界数据：分页、固定批次、协议天然小集合、已校验大小的入参；订阅流、消息流、全表查询、设备属性历史、用户可控查询优先分页、take/limit、buffer/window、批量仓储、QueryHelper.transformPageResult 或 QueryHelper.combineOneToMany。7)lambda 只做转换和链路衔接；像过程式脚本时先按业务意图抽成命名函数；纯转换返回普通对象，包含 DB / 远程 / 异步副作用时才返回 Mono / Flux。8)注释门禁：非显而易见的异步边界、批量 / 背压限制、重试 / 超时策略、生命周期清理、兼容逻辑、TraceHolder 上下文传播要在代码旁边写短注释；直接 map / flatMap 胶水和命名清楚的小方法不写噪声注释。9)错误传播：用户可见异常在 Mono.error / Flux.error 中传带 i18nCode 的异常实例，不直接 new XxxException("对象不存在")。10)阻塞依赖先找非阻塞抽象；没有就只在必要边界隔离；publishOn / subscribeOn 是显式调度边界，boundedElastic 只用于无法避免的遗留阻塞调用；超时缓存优先 ReactiveCache，本地 TTL/size 用 Caffeine。11)事件 / 订阅处理器优先返回 Mono<Void> 或本框架惯用异步类型；高吞吐消息处理复用 buffer / window / 批处理 sink / 去重，保持幂等。12)验证值、完成 / 错误信号、顺序、并发、超时、重试、副作用、N+1、集合边界、追踪埋点不改变链路语义和背压 / 批量策略；不靠 sleep、吞错或弱化断言让测试通过。13)协同：根因路径、代码注释和 TraceHolder 埋点边界走 $jetlinks-conventions；事件 / 订阅走 $jetlinks-events；跨模块调用走 $jetlinks-boundary；CRUD 副作用响应式化走 $jetlinks-crud。详细规范和示例见 references/reactive-practice.md。
