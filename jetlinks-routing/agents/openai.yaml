interface:
  display_name: "JetLinks Routing"
  short_description: "JetLinks 模块发现与落点判断"
  default_prompt: >-
    使用 $jetlinks-routing 探测当前 JetLinks 工作区结构、给业务能力找到正确的承载模块，必要时再判断是否新建模块。1)与 $jetlinks-router 区别：router 做"任务 → 技能"分类，routing 做"任务 → 后端模块"的物理落点。2)模块发现顺序：先看根目录（pom.xml + modules / components / jetlinks-components / microservices / services / apps / bootstrap 等聚合目录、含目录软链接）→ 再看根 / 一级聚合 pom.xml 的 <modules> 区分聚合模块和实现模块 → 看相邻模块的目录名 / artifactId / 包名 / 资源路径判断职责 → 看模块内部 entity / service / web / command / configuration / events / resources/i18n 等分层 → 软链接目录同时确认入口路径和真实目标，搜索工具默认不跟随链接时显式启用跟随。3)落点判断：先找与目标领域最接近的模块，能扩展就扩展，不要为单个能力新建模块；只有跨域、独立交付、独立依赖或独立部署单元时才新建；新建模块必须复用现有命名 / 分层 / 包结构 / i18n 资源目录习惯。4)模块清单必须从当前工作区实时发现，不要凭记忆给"标准模块列表"。5)低上下文脚手架（接近空模板）按 references/module-creation-rules.md 决定第一批模块的命名、分层、聚合归属；新建公共配置类、SPI 入口、契约接口或首个参考类时，补类注释说明模块职责、边界和调用方。6)协同：识别后切对应实现技能（$jetlinks-crud / $jetlinks-events / $jetlinks-protocol 等）；跨模块调用边界切 $jetlinks-boundary；命名、包结构、注解、i18n、注释切 $jetlinks-conventions。详细规范见 references/module-list.md（发现指南）和 references/module-creation-rules.md（新建模块）。
