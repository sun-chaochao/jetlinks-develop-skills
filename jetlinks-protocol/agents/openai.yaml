interface:
  display_name: "JetLinks Protocol"
  short_description: "JetLinks 协议包开发、阅读、二进制报文分析与联调排障"
  default_prompt: >-
    使用 $jetlinks-protocol 处理 JetLinks 协议包：定位传输 / 编解码路径，实现新接入或排障联调。1)必读：references/protocol-workflow.md（5 步工作流：找注册边 / 上行解码 / 下行编码 / 本地模式扩展 / 收尾自检）、references/development-patterns.md（ProtocolSupportProvider / CompositeProtocolSupport / 编解码 / 鉴权 / 路由 / config metadata / 文档常用骨架 / 注释契约）、references/transport-codecs.md（MQTT / HTTP / TCP / UDP / CoAP 编解码差异）、references/binary-message-patterns.md（粘拆包 / 长度前缀 / 定长 / 分隔符 / 转义）、references/example-locations.md（仓库内可参考的现成协议）、references/debugging-checklist.md（联调与排障对照）。2)注册边先看：搜 ProtocolSupportProvider / CompositeProtocolSupport 等支持启动代码，记录每个 addMessageCodecSupport / addAuthenticator / addRoutes / addConfigMetadata / setDocument；多 transport 复用同一 codec 时注意 config metadata 与鉴权差异。3)上行链路：从 transport 入口（topic / path / socket frame / packet buffer / request body）出发，确认鉴权在解码之前还是之后，跟到原始数据变成 DeviceMessage 的那一点；记录解码时加的 headers，尤其是 message 序号 / token / reply marker。4)下行链路：找到平台消息映射回 transport 输出的位置；确认 topic / HTTP 响应 / socket 包 / 二进制帧的组装；双向协议要验证 reply / ACK / request-response 关联是否保留。5)实现以本地模式为准：扩展现有路由注册、codec 类、消息包装器、helper 枚举，不引入新抽象；协议文档跟随其 transport 就近放；测试紧邻被改动的 codec 或 packet 抽象。6)注释门禁：Provider / Codec / parser / packet registry 等公共契约要写类或方法注释；wire 兼容、端序、长度字段、转义、ACK / sequence 关联、ByteBuf 生命周期、鉴权顺序、transport 差异要在代码旁边写短注释；简单字段搬运不写噪声注释。7)收尾自检：provider 是否注册目标 transport + 必要的鉴权 / config metadata；上行解码与下行编码是否在协议预期对称处保持对称；docs / examples / tests 是否还描述当前 wire 行为；字段或 transport 路由变动是否显式标出兼容风险；必要注释是否已落到代码里。8)协同：编解码链路里的 Mono / Flux / 阻塞冲突走 $jetlinks-reactive；新建协议模块的归属与命名走 $jetlinks-routing；命名 / 注解 / 国际化 / 注释 / 根因走 $jetlinks-conventions；CRUD 副作用（配置元数据 / 协议支持记录）走 $jetlinks-crud；交付走 $jetlinks-delivery 并在 PR 描述里给出协议联调证据。
