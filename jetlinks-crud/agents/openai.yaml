interface:
  display_name: "JetLinks CRUD"
  short_description: "JetLinks CRUD 与复杂查询实现"
  default_prompt: >-
    使用 $jetlinks-crud 在本模块现有风格内新增或修改 JetLinks 实体 / 服务 / 控制器 / 查询 / 批量更新与 CRUD 相关副作用。1)必读：references/common-crud-rules.md（实体 / 服务 / 控制器 / 标准 CRUD / 基础权限 / AssetsHolder 数据权限路由 / 文案 / 注释落地）、references/query-dsl-rules.md（createQuery / createUpdate / createDelete / QueryParamEntity / setParam / setNull / 排序 / 嵌套 / 分页 / QueryHelper / AssetsHolder 查询注入 / DSL 可读性）、references/advanced-crud-rules.md（批量更新、事务、聚合查询、复杂分页与排序、复杂 SQL 与多查询组合）、references/dynamic-term-rules.md（动态查询条件 / QueryParam / Term 体系）。2)较大的 CRUD 改动或新功能先走 ../jetlinks-router/references/backend-design-test-driven-rules.md：设计稿、任务拆分、测试目标落到 docs，用户明确确认后再开发；测试目标必须映射真实使用场景和真实数据，不允许为了过测弱化断言、只 mock 核心逻辑或只跑无关测试。3)先判断模块编程模型：看控制器返回类型、服务基类、仓储接口；模块已经明显统一了风格就跟随，全新模块且无可参考实现再问用户，用户不确定就建议跟随当前脚手架主流模式，不要机械问"响应式还是阻塞"。4)最小实现：Service 只保留确实需要的扩展逻辑，基类已有的标准 CRUD 不要重复包；Controller 只暴露用户要求的接口，框架通过基类 / 接口暴露的通用 CRUD 不再造轮子；查询优先复用 _query / createQuery / QueryParam / Term 体系；复杂 CRUD DSL 不压成一条长链，查询构造、权限注入、排序分页、结果装配、副作用按业务阶段拆成命名参数、query builder 或 helper；更新删除优先 createUpdate / createDelete，清空字段用 setNull；排序、嵌套 OR / AND、分页稳定性和服务端固定条件按 query-dsl-rules.md 处理。5)复杂 SQL 与多查询组合：复杂 SQL、原生 SQL、跨表、聚合、动态列优先 QueryHelper / DefaultQueryHelper 或当前模块封装，不拼接动态 SQL；SQL 默认兼容标准 SQL，除非用户明确限定数据库或模块已有约束，不写特定数据库方言；分页转换优先 QueryHelper.transformPageResult，父子一对多装配优先 QueryHelper.combineOneToMany，普通分页优先 QueryHelper.queryPager，不手写分页元信息或 N+1 子查询；复杂 SQL 必须按真实数据量、分页深度、索引和并发做压力测试或替代性能验证。6)AssetsHolder 数据权限：涉及查询 / 详情 / 更新 / 删除 / 批量 / 导出 / 自定义接口时，CRUD 技能只负责判断是否需要数据权限并切到 $jetlinks-assets-permission；具体实现统一复用 AssetType、@AssetsController、AssetsHolderCrudController、CorrelatesAssetsHolderCrudController、CrudAssetPermission、AssetsHolder.injectQueryParam / injectConditional / assertPermission，不手写租户 / 部门 / 创建人过滤；拿不准资产类型、关联字段、权限动作或绑定关系时先问用户。7)字段 / 校验 / 文案 / 注释：实体字段沿用本模块命名与注解风格；校验注解走 javax.validation 或本模块已有约束；用户可见的错误 message / 字典 / 权限动作文案走 i18n；新增或修改公共 Entity / DTO / Controller / Service、自定义接口、复杂校验、AssetsHolder 边界、兼容逻辑、批量上限或复杂查询时必须把短注释写到代码旁边，只有标准继承、简单字段、DTO 搬运或直观委托可不写。8)CRUD 副作用：发布消息 / 远程调用 / 缓存同步 / 广播通知优先放在事件层或提交后阶段，不全塞进主链路；响应式模块按批处理思路实现，禁止在 flatMap 内逐条做 DB 或远程调用。9)动态条件：复用 ConditionFilter / Term / loadOptions / loadSelectedOptions / rename / routeAlias 等扩展点，不为单字段过滤手写 SQL 拼接。10)协同：AssetsHolder 数据权限切 $jetlinks-assets-permission；编程模型、Mono / Flux、阻塞回退切 $jetlinks-reactive；事件 / 订阅副作用切 $jetlinks-events；跨模块访问切 $jetlinks-boundary；模块归属歧义切 $jetlinks-routing；命名 / 注解 / i18n / 注释 / 根因切 $jetlinks-conventions；交付切 $jetlinks-delivery。
