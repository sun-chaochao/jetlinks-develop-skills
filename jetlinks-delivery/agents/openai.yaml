interface:
  display_name: "JetLinks Delivery"
  short_description: "JetLinks 提交信息、提交命令、后端测试门禁与PR交付规范"
  default_prompt: >-
    使用 $jetlinks-delivery 起草符合规范的中文 commit、shell 安全的提交命令、测试证据与 PR 描述。1)必读：references/commit-message-zh.md（中文 commit 体例）、references/shell-commit-examples.md（按 bash/zsh、PowerShell、cmd 选择安全提交命令）、references/git-and-pr-rules.md（分支策略 + PR 必备字段 + 后端测试门禁 + 测试证据 + 文档同步）。2)提交标题规范：默认 `type(scope): summary`；type 跟仓库历史（优先 feat / fix / refactor / docs / test）；scope 选真实模块 / 业务域 / 规则域，不要 update / fix bug / misc / test 这种空泛词；summary 中文动宾短语直接说结果，不写"修改了一些代码"。3)分支策略：禁止直接 push 到 master / main / 集成版本分支；新分支命名跟仓库已有风格；必须走 PR 合并；任何受保护分支只能 fast-forward 或经 PR 合并，不能强推。4)shell 提交命令按用户 shell 选择 references/shell-commit-examples.md 中的 here-doc、PowerShell here-string、临时文件或 `git commit -F -` 等形式，避免 `"`、`$`、反引号和字面 `\n` 破坏消息；commit 后 `git status` 验证。5)后端新增功能或既有功能变动必须补齐对应单元测试和单元测试覆盖率；涉及数据库、消息、事件、协议、跨模块边界、外部依赖或启动装配时补集成测试或给出结果，未触发时写明不适用原因。6)交付前自检：单元 / 集成测试是否跑过、单元测试覆盖率是否有数字、相关文档（SKILL.md / references / openai.yaml）是否与实现一致、是否存在新增不稳定依赖、是否有 root cause / no-hack 红线需要在交付说明中留痕。7)PR 描述至少包含：变更摘要（为什么、不是做了什么）、测试证据（命令 + 新增/更新测试类 + 通过结果 + 覆盖率数字 + 集成测试结果或不适用原因，没法跑明确说明原因）、文档同步情况、风险与回滚、关联 issue / 文档。8)高风险动作（反射 / Unsafe / 改可见性 / 复制源码 / monkey patch / 响应式模块阻塞调用 / 新增不稳定依赖）必须在 PR 描述显式列出风险点与替代方案讨论结果。9)协同：根因 / no-hack 留痕规则来自 $jetlinks-conventions；交付完成后判断是否值得沉淀走 $jetlinks-capture；测试证据缺失时回到对应实现技能补测，缺门禁的后端 PR 不进入 ready for review。
